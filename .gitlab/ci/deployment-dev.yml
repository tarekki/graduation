deploy-dev:
  stage: deploy
  image: docker:latest

  services:
    - docker:dind

  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: "tcp://docker:2375"
    IMAGE_NAME: "shamcashreport:test"

  only:
    - dev

  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SERVER_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - if [ -z "$SERVER_IP" ]; then echo "SERVER_IP is missing"; exit 1; fi
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts

  script:
    # Create env file
    - echo "$ENV_FILE_CONTENT" > .env.production.local

    # Build Docker image
    - echo "Building the Docker image..."
    - |
      docker build \
      --build-arg ENV_FILE=.env.production.local \
      -t $IMAGE_NAME \
      .

    # Stream image directly to server and deploy
    - echo "Transferring and deploying..."
    - |
      docker save $IMAGE_NAME | gzip | ssh $SERVER_USER@$SERVER_IP "
      gunzip | docker load &&
        docker stop shamcash_report_prod_container || true &&
        docker rm shamcash_report_prod_container || true &&
        docker run -d \
          --name shamcash_report_prod_container \
          -p 5004:3000 \
          --restart unless-stopped \
          $IMAGE_NAME
      "
