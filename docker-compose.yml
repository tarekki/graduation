# Stable project name so the directory name ("backend") can't collide with
# other Compose projects on the same machine.
name: carnova

services:
  db:
    image: postgres:16
    container_name: carnova_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: carnova_db
      POSTGRES_USER: carnova_user
      POSTGRES_PASSWORD: carnova_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Host port is configurable (default 5432) to avoid clashes with a
      # native PostgreSQL or another project; container port stays 5432.
      - "${DB_HOST_PORT:-5432}:5432"

  backend:
    build: .
    container_name: carnova_backend
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
    ports:
      # Host port is configurable (default 8000); container port stays 8000.
      - "${WEB_HOST_PORT:-8000}:8000"

volumes:
  postgres_data:
